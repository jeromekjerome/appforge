<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AppForge Admin</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0c0c0e; --surface: #141418; --surface2: #1c1c22;
    --border: rgba(255,255,255,0.07); --border2: rgba(255,255,255,0.13);
    --text: #ede9e2; --text2: #9a9590; --text3: #5e5c58;
    --accent: #e8a84c; --accent-dim: rgba(232,168,76,0.12); --accent-text: #f5c97a;
    --teal: #5ec4a8; --teal-dim: rgba(94,196,168,0.1);
    --radius: 12px; --radius-sm: 7px;
  }
  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; font-size: 14px; -webkit-font-smoothing: antialiased; }

  .header { display: flex; align-items: center; justify-content: space-between; padding: 1rem 1.5rem; border-bottom: 1px solid var(--border); }
  .header-title { font-family: Georgia, serif; font-size: 1rem; color: var(--text2); }
  .header-title span { color: var(--accent); }
  .header-stats { display: flex; gap: 1.5rem; }
  .stat { text-align: right; }
  .stat-val { font-size: 1.1rem; font-weight: 500; color: var(--text); }
  .stat-label { font-size: 0.7rem; color: var(--text3); text-transform: uppercase; letter-spacing: 0.05em; }

  .layout { display: grid; grid-template-columns: 340px 1fr; height: calc(100vh - 57px); }

  .lead-list { border-right: 1px solid var(--border); overflow-y: auto; }
  .lead-list::-webkit-scrollbar { width: 3px; }
  .lead-list::-webkit-scrollbar-thumb { background: var(--border2); }

  .lead-item { padding: 1rem 1.25rem; border-bottom: 1px solid var(--border); cursor: pointer; transition: background 0.15s; }
  .lead-item:hover { background: var(--surface); }
  .lead-item.active { background: var(--surface2); border-left: 2px solid var(--accent); }

  .lead-item-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 0.25rem; }
  .lead-name { font-weight: 500; font-size: 0.88rem; color: var(--text); }
  .lead-date { font-size: 0.72rem; color: var(--text3); }
  .lead-email { font-size: 0.78rem; color: var(--text2); margin-bottom: 0.4rem; }
  .lead-preview { font-size: 0.75rem; color: var(--text3); line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }

  .status-badge { display: inline-block; padding: 0.15rem 0.5rem; border-radius: 100px; font-size: 0.68rem; font-weight: 500; text-transform: uppercase; letter-spacing: 0.06em; }
  .status-new      { background: rgba(94,196,168,0.15); color: var(--teal); }
  .status-quoted   { background: var(--accent-dim); color: var(--accent-text); }
  .status-in_build { background: rgba(100,100,255,0.15); color: #a0a0ff; }
  .status-delivered { background: rgba(80,200,80,0.15); color: #80d080; }

  .detail-pane { display: flex; flex-direction: column; overflow: hidden; }

  .empty-state { flex: 1; display: flex; align-items: center; justify-content: center; color: var(--text3); font-size: 0.9rem; }

  .detail-header { padding: 1.25rem 1.5rem; border-bottom: 1px solid var(--border); display: flex; align-items: flex-start; justify-content: space-between; gap: 1rem; flex-shrink: 0; }
  .detail-name { font-size: 1rem; font-weight: 500; margin-bottom: 0.2rem; }
  .detail-meta { font-size: 0.8rem; color: var(--text2); }

  .detail-controls { display: flex; gap: 8px; align-items: center; flex-shrink: 0; }
  .control-select { background: var(--surface2); border: 1px solid var(--border2); border-radius: var(--radius-sm); padding: 0.4rem 0.7rem; color: var(--text); font-size: 0.8rem; outline: none; cursor: pointer; }

  .detail-body { flex: 1; overflow-y: auto; padding: 1.5rem; display: flex; flex-direction: column; gap: 1.25rem; }
  .detail-body::-webkit-scrollbar { width: 3px; }
  .detail-body::-webkit-scrollbar-thumb { background: var(--border2); }

  .section-label { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text3); margin-bottom: 0.6rem; }

  .spec-block { background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius); padding: 1rem 1.25rem; font-family: 'SF Mono', 'Cascadia Code', monospace; font-size: 0.78rem; line-height: 1.7; color: var(--text2); white-space: pre-wrap; word-break: break-word; max-height: 400px; overflow-y: auto; }

  .notes-area { width: 100%; background: var(--surface2); border: 1px solid var(--border2); border-radius: var(--radius-sm); padding: 0.75rem 1rem; color: var(--text); font-size: 0.88rem; font-family: inherit; resize: vertical; min-height: 80px; outline: none; transition: border-color 0.2s; }
  .notes-area:focus { border-color: rgba(232,168,76,0.4); }

  .save-btn { margin-top: 0.5rem; padding: 0.5rem 1rem; background: var(--accent); color: #1a0e00; border: none; border-radius: var(--radius-sm); font-size: 0.82rem; font-weight: 600; cursor: pointer; transition: opacity 0.2s; }
  .save-btn:hover { opacity: 0.88; }

  .context-tag { display: inline-block; padding: 0.15rem 0.5rem; background: var(--surface2); border: 1px solid var(--border2); border-radius: 4px; font-size: 0.72rem; color: var(--text3); text-transform: uppercase; letter-spacing: 0.05em; }

  .loading { text-align: center; padding: 2rem; color: var(--text3); }
</style>
</head>
<body>

<div class="header">
  <div class="header-title">App<span>Forge</span> Admin</div>
  <div class="header-stats">
    <div class="stat">
      <div class="stat-val" id="totalCount">—</div>
      <div class="stat-label">Total leads</div>
    </div>
    <div class="stat">
      <div class="stat-val" id="newCount">—</div>
      <div class="stat-label">New</div>
    </div>
  </div>
</div>

<div class="layout">
  <div class="lead-list" id="leadList">
    <div class="loading">Loading…</div>
  </div>

  <div class="detail-pane" id="detailPane">
    <div class="empty-state">Select a lead to view details</div>
  </div>
</div>

<script>
  const secret = new URLSearchParams(location.search).get('secret') || '';
  const headers = { 'Content-Type': 'application/json', 'x-admin-secret': secret };

  let leads = [];
  let activeLead = null;

  async function loadLeads() {
    try {
      const res = await fetch('/api/admin/leads', { headers });
      if (res.status === 401) { document.body.innerHTML = '<div style="padding:3rem;color:#e8a84c;font-family:Georgia,serif;font-size:1.2rem;">Unauthorized</div>'; return; }
      leads = await res.json();
      renderList();
      document.getElementById('totalCount').textContent = leads.length;
      document.getElementById('newCount').textContent = leads.filter(l => l.status === 'new').length;
    } catch (err) { console.error(err); }
  }

  function renderList() {
    const el = document.getElementById('leadList');
    if (!leads.length) { el.innerHTML = '<div class="loading">No leads yet</div>'; return; }
    el.innerHTML = leads.map(l => `
      <div class="lead-item ${activeLead?.id === l.id ? 'active' : ''}" onclick="selectLead(${l.id})">
        <div class="lead-item-top">
          <span class="lead-name">${escHtml(l.name || 'Anonymous')}</span>
          <span class="lead-date">${formatDate(l.created_at)}</span>
        </div>
        <div class="lead-email">${escHtml(l.email)}</div>
        <div style="display:flex;align-items:center;gap:6px;margin-bottom:0.35rem;">
          <span class="status-badge status-${l.status}">${l.status.replace('_', ' ')}</span>
          <span class="context-tag">${l.context}</span>
        </div>
        <div class="lead-preview">${escHtml(l.spec_preview || '')}</div>
      </div>
    `).join('');
  }

  async function selectLead(id) {
    const res = await fetch(`/api/admin/leads/${id}`, { headers });
    activeLead = await res.json();
    renderList();
    renderDetail();
  }

  function renderDetail() {
    const l = activeLead;
    document.getElementById('detailPane').innerHTML = `
      <div class="detail-header">
        <div>
          <div class="detail-name">${escHtml(l.name || 'Anonymous')}</div>
          <div class="detail-meta">${escHtml(l.email)} · ${formatDate(l.created_at)} · <span class="context-tag">${l.context}</span></div>
        </div>
        <div class="detail-controls">
          <select class="control-select" id="statusSelect" onchange="updateStatus(this.value)">
            <option value="new"      ${l.status==='new'?'selected':''}>New</option>
            <option value="quoted"   ${l.status==='quoted'?'selected':''}>Quoted</option>
            <option value="in_build" ${l.status==='in_build'?'selected':''}>In build</option>
            <option value="delivered"${l.status==='delivered'?'selected':''}>Delivered</option>
          </select>
        </div>
      </div>
      <div class="detail-body">
        <div>
          <div class="section-label">Spec</div>
          <div class="spec-block">${escHtml(l.spec_markdown)}</div>
        </div>
        <div>
          <div class="section-label">Notes</div>
          <textarea class="notes-area" id="notesArea" placeholder="Add notes…">${escHtml(l.notes || '')}</textarea>
          <button class="save-btn" onclick="saveNotes()">Save notes</button>
        </div>
      </div>
    `;
  }

  async function updateStatus(status) {
    await fetch(`/api/admin/leads/${activeLead.id}`, {
      method: 'PATCH',
      headers,
      body: JSON.stringify({ status })
    });
    activeLead.status = status;
    const lead = leads.find(l => l.id === activeLead.id);
    if (lead) lead.status = status;
    renderList();
    document.getElementById('newCount').textContent = leads.filter(l => l.status === 'new').length;
  }

  async function saveNotes() {
    const notes = document.getElementById('notesArea').value;
    await fetch(`/api/admin/leads/${activeLead.id}`, {
      method: 'PATCH',
      headers,
      body: JSON.stringify({ notes })
    });
    activeLead.notes = notes;
  }

  function formatDate(iso) {
    const d = new Date(iso);
    return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
  }

  function escHtml(str) {
    return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  loadLeads();
</script>
</body>
</html>
